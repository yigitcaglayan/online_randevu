{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="card">
        <h2>Giriş Yap</h2>
        <form action="{{ url_for('login') }}" method="POST">
            <input type="text" name="username" placeholder="Kullanıcı Adı" required>
            <input type="password" name="password" placeholder="Şifre" required>
            <button type="submit" class="btn btn-primary" style="width: 100%">Giriş</button>
        </form>
    </div>

    <div class="card">
        <h2>Kayıt Ol</h2>
        <form action="{{ url_for('register') }}" method="POST">
            <input type="text" name="username" placeholder="Kullanıcı Adı" required>
            <input type="password" name="password" placeholder="Şifre" required>
            <select name="role" required>
                <option value="" disabled selected>Rol Seçiniz</option>
                <option value="owner">İşletme Sahibi</option>
                <option value="customer">Müşteri</option>
            </select>
            <button type="submit" class="btn btn-primary" style="width: 100%">Kayıt Ol</button>
        </form>
    </div>
</div>
{% endblock %}
